version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bancocbp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: alex
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: BancoBCP
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alex -d BancoBCP"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bancocbp_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: alex
      DB_PASSWORD: 123456
      DB_NAME: BancoBCP
      JWT_SECRET: bancocbp_jwt_secret_2024
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: bancocbp_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
